name: UI Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Cucumber UI tests (headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # ubuntu-latest runners ship with Google Chrome preinstalled;
      # Selenium Manager resolves the matching chromedriver automatically.
      - name: Show Chrome version
        run: google-chrome --version

      - name: Run tests
        # rerun flaky live-site scenarios before failing the build
        run: ./mvnw -B test -Dsurefire.rerunFailingTestsCount=2

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore
